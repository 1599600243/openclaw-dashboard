<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Dashboard - 聊天管理版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .header {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header .subtitle {
            font-size: 1rem;
            opacity: 0.8;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .status-healthy {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }
        
        .status-error {
            background: rgba(255, 65, 108, 0.2);
            color: #ff416c;
        }
        
        .main-container {
            display: flex;
            height: calc(100vh - 140px);
        }
        
        /* 左侧会话列表 */
        .session-list-panel {
            width: 320px;
            background: rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
            padding: 20px;
        }
        
        .panel-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .session-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .btn {
            padding: 8px 16px;
            background: linear-gradient(45deg, #00dbde, #0093e9);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 219, 222, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .session-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .session-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 219, 222, 0.3);
        }
        
        .session-item.active {
            background: rgba(0, 219, 222, 0.1);
            border-color: rgba(0, 219, 222, 0.5);
        }
        
        .session-name {
            font-weight: bold;
            color: #00dbde;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }
        
        .session-details {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        .session-stats {
            font-size: 0.8rem;
            opacity: 0.6;
            display: flex;
            justify-content: space-between;
        }
        
        /* 右侧聊天窗口 */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
        }
        
        .chat-header {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chat-header-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #00dbde;
        }
        
        .chat-header-subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            max-width: 80%;
            position: relative;
        }
        
        .message-user {
            background: linear-gradient(135deg, #1d2671, #C33764);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .message-assistant {
            background: linear-gradient(135deg, #2c3e50, #4CA1AF);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        
        .message-tool {
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            border-left: 4px solid #ff9800;
        }
        
        .message-unknown {
            background: rgba(255, 255, 255, 0.1);
            margin-right: auto;
            border-left: 4px solid #999;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .message-role {
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .message-time {
            font-size: 0.8rem;
            opacity: 0.7;
        }
        
        .message-tool-name {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-left: 8px;
        }
        
        .message-content {
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        
        .chat-input-area {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chat-input-container {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            resize: none;
            min-height: 60px;
            font-family: inherit;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: rgba(0, 219, 222, 0.5);
        }
        
        .chat-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.8;
        }
        
        .error {
            background: rgba(255, 65, 108, 0.2);
            border: 1px solid rgba(255, 65, 108, 0.3);
            color: #ff416c;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        .success {
            background: rgba(17, 153, 142, 0.2);
            border: 1px solid rgba(17, 153, 142, 0.3);
            color: #11998e;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        /* 工具消息展开/收起 */
        .tool-toggle {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid rgba(255, 152, 0, 0.3);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
        }
        
        .tool-content {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            
            .session-list-panel {
                width: 100%;
                height: 300px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💬 OpenClaw 聊天管理面板</h1>
        <div class="subtitle">完整对话历史 + 实时消息管理 | 版本: 1.1.0</div>
    </div>
    
    <div class="status-bar">
        <div class="status-item">
            <span>CLI代理:</span>
            <div class="status-badge status-healthy" id="cliStatus">检测中...</div>
        </div>
        <div class="status-item">
            <span>会话数:</span>
            <div class="status-badge" id="sessionCount">0</div>
        </div>
        <div class="status-item">
            <span>当前会话:</span>
            <div class="status-badge" id="currentSession">未选择</div>
        </div>
        <div class="status-item">
            <span>消息数:</span>
            <div class="status-badge" id="messageCount">0</div>
        </div>
    </div>
    
    <div class="main-container">
        <!-- 左侧会话列表 -->
        <div class="session-list-panel">
            <div class="panel-title">📋 会话列表</div>
            
            <div class="session-controls">
                <button class="btn" onclick="loadSessions()">🔄 刷新</button>
                <button class="btn btn-secondary" onclick="clearChat()">🗑️ 清空聊天</button>
                <button class="btn btn-secondary" onclick="exportChat()">💾 导出</button>
            </div>
            
            <div id="sessionList">
                <div class="loading">点击"刷新"加载会话列表</div>
            </div>
        </div>
        
        <!-- 右侧聊天窗口 -->
        <div class="chat-panel">
            <div class="chat-header">
                <div class="chat-header-title" id="chatTitle">请选择一个会话开始聊天</div>
                <div class="chat-header-subtitle" id="chatSubtitle">选择左侧的会话查看完整对话历史</div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="loading">
                    <p>👈 从左侧选择一个会话</p>
                    <p>或者创建一个新的会话开始对话</p>
                </div>
            </div>
            
            <div class="chat-input-area">
                <div class="chat-input-container">
                    <textarea 
                        class="chat-input" 
                        id="messageInput" 
                        placeholder="输入消息... (Enter发送，Shift+Enter换行)"
                        disabled
                    ></textarea>
                    <button class="btn" id="sendButton" onclick="sendMessage()" disabled>发送</button>
                </div>
                
                <div class="chat-controls">
                    <button class="btn btn-secondary" onclick="refreshChat()">🔄 刷新聊天</button>
                    <button class="btn btn-secondary" onclick="clearInput()">🗑️ 清空输入</button>
                    <button class="btn btn-secondary" onclick="testAPI()">🧪 测试API</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const API_BASE = 'http://localhost:3002';
        let currentSession = null;
        let currentSessionLabel = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 测试连接
            testConnection();
            
            // 绑定发送快捷键
            document.getElementById('messageInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // 加载会话列表
            setTimeout(loadSessions, 1000);
        });
        
        // 测试连接
        async function testConnection() {
            const status = document.getElementById('cliStatus');
            
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                if (data.status === 'healthy') {
                    status.textContent = '✅ 健康';
                    status.className = 'status-badge status-healthy';
                    return true;
                } else {
                    status.textContent = '❌ 异常';
                    status.className = 'status-badge status-error';
                    return false;
                }
            } catch (error) {
                console.error('连接测试失败:', error);
                status.textContent = '❌ 离线';
                status.className = 'status-badge status-error';
                return false;
            }
        }
        
        // 加载会话列表
        async function loadSessions() {
            const sessionList = document.getElementById('sessionList');
            const sessionCount = document.getElementById('sessionCount');
            
            try {
                sessionList.innerHTML = '<div class="loading">正在加载会话...</div>';
                
                const response = await fetch(`${API_BASE}/api/sessions`);
                const data = await response.json();
                
                if (data.success && data.data && data.data.sessions) {
                    const sessions = data.data.sessions;
                    sessionCount.textContent = sessions.length;
                    
                    if (sessions.length === 0) {
                        sessionList.innerHTML = '<div class="loading">暂无会话</div>';
                        return;
                    }
                    
                    sessionList.innerHTML = sessions.map(session => {
                        const sessionId = session.sessionId || session.sessionKey;
                        const displayId = sessionId.length > 20 ? sessionId.substring(0, 20) + '...' : sessionId;
                        const messageCount = session.messageCount || 0;
                        const lastActive = session.lastMessageAt ? 
                            new Date(session.lastMessageAt).toLocaleString() : '从未';
                        
                        return `
                        <div class="session-item" 
                             onclick="selectSession('${sessionId}', '${session.label}')" 
                             data-session-id="${sessionId}">
                            <div class="session-name">${session.label}</div>
                            <div class="session-details">
                                ID: ${displayId}<br>
                                Agent: ${session.agentId} | 模型: ${session.model}
                            </div>
                            <div class="session-stats">
                                <span>消息: ${messageCount}</span>
                                <span>最后: ${lastActive}</span>
                            </div>
                        </div>
                    `}).join('');
                    
                    // 如果有会话，自动选择第一个
                    if (sessions.length > 0 && !currentSession) {
                        const firstSession = sessions[0];
                        const firstSessionId = firstSession.sessionId || firstSession.sessionKey;
                        selectSession(firstSessionId, firstSession.label);
                    }
                } else {
                    sessionList.innerHTML = '<div class="error">无法加载会话数据</div>';
                }
            } catch (error) {
                console.error('加载会话失败:', error);
                sessionList.innerHTML = `<div class="error">连接失败: ${error.message}</div>`;
            }
        }
        
        // 选择会话
        function selectSession(sessionId, sessionLabel) {
            currentSession = sessionId;
            currentSessionLabel = sessionLabel;
            
            // 更新UI状态
            document.getElementById('currentSession').textContent = sessionLabel;
            
            // 更新会话项激活状态
            document.querySelectorAll('.session-item').forEach(item => {
                item.classList.remove('active');
            });
            
            const items = document.querySelectorAll('.session-item');
            for (let item of items) {
                const itemSessionId = item.getAttribute('data-session-id');
                if (itemSessionId === sessionId) {
                    item.classList.add('active');
                    break;
                }
            }
            
            // 更新聊天标题
            document.getElementById('chatTitle').textContent = `💬 ${sessionLabel}`;
            document.getElementById('chatSubtitle').textContent = `会话ID: ${sessionId}`;
            
            // 启用输入框
            document.getElementById('messageInput').disabled = false;
            document.getElementById('messageInput').placeholder = `发送消息到 ${sessionLabel}...`;
            document.getElementById('messageInput').focus();
            document.getElementById('sendButton').disabled = false;
            
            // 加载聊天历史
            loadChatMessages(sessionId);
        }
        
        // 加载聊天消息
        async function loadChatMessages(sessionId) {
            const chatMessages = document.getElementById('chatMessages');
            const messageCount = document.getElementById('messageCount');
            
            try {
                chatMessages.innerHTML = '<div class="loading">加载对话历史中...</div>';
                
                // 使用新的API路径 /api/session/:sessionId/messages
                const response = await fetch(`${API_BASE}/api/session/${sessionId}/messages`);
                const data = await response.json();
                
                if (data.success) {
                    messageCount.textContent = data.count || data.messages.length;
                    
                    if (data.messages && data.messages.length > 0) {
                        renderMessages(data.messages, chatMessages);
                    } else {
                        chatMessages.innerHTML = `
                            <div class="loading">
                                <p>📭 暂无历史消息</p>
                                <p>发送第一条消息开始对话吧！</p>
                            </div>
                        `;
                    }
                } else {
                    chatMessages.innerHTML = '<div class="error">无法加载消息</div>';
                }
            } catch (error) {
                console.error('加载聊天失败:', error);
                chatMessages.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
            }
        }
        
        // 渲染消息
        function renderMessages(messages, container) {
            container.innerHTML = messages.map(msg => {
                const role = msg.role || 'unknown';
                const timestamp = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : '未知时间';
                
                // 智能提取可读内容
                const content = extractReadableContent(msg);
                
                // 根据角色确定消息样式
                let roleDisplay = role;
                let messageClass = 'message-unknown';
                
                if (role === 'user' || role === 'human') {
                    roleDisplay = '👤 用户';
                    messageClass = 'message-user';
                } else if (role === 'assistant') {
                    roleDisplay = '🤖 AI助手';
                    messageClass = 'message-assistant';
                } else if (role === 'tool') {
                    roleDisplay = '🔧 工具';
                    messageClass = 'message-tool';
                }
                
                // 处理工具消息的显示
                let toolContent = '';
                if (role === 'tool' && msg.toolName) {
                    roleDisplay += ` (${msg.toolName})`;
                }
                
                return `
                    <div class="message ${messageClass}">
                        <div class="message-header">
                            <div class="message-role">
                                ${roleDisplay}
                                ${msg.toolName ? `<span class="message-tool-name">${msg.toolName}</span>` : ''}
                            </div>
                            <div class="message-time">${timestamp}</div>
                        </div>
                        <div class="message-content">${escapeHtml(content)}</div>
                    </div>
                `;
            }).join('');
            
            // 滚动到底部
            container.scrollTop = container.scrollHeight;
        }
        
        // 智能提取可读内容
        function extractReadableContent(msg) {
            // 如果content是字符串，直接返回
            if (typeof msg.content === 'string') {
                return msg.content;
            }
            
            // 如果content是数组（常见于AI回复）
            if (Array.isArray(msg.content)) {
                // 提取所有文本内容
                const texts = msg.content.map(item => {
                    if (typeof item === 'string') {
                        return item;
                    } else if (item && typeof item === 'object') {
                        // 处理不同类型的消息块
                        if (item.type === 'text' && item.text) {
                            return item.text;
                        } else if (item.type === 'thinking' && item.thinking) {
                            return `🤔 思考: ${item.thinking}`;
                        } else if (item.type === 'toolCall' && item.toolName) {
                            return `🔧 调用工具: ${item.toolName}`;
                        } else if (item.type === 'toolResult') {
                            return `✅ 工具执行完成`;
                        } else {
                            return JSON.stringify(item, null, 2);
                        }
                    }
                    return '';
                }).filter(text => text.trim());
                
                return texts.join('\n\n');
            }
            
            // 如果content是对象
            if (msg.content && typeof msg.content === 'object') {
                // 检查是否是AI回复格式
                if (msg.content.role === 'assistant' && Array.isArray(msg.content.content)) {
                    return extractReadableContent({ content: msg.content.content });
                }
                
                // 否则返回格式化的JSON
                try {
                    return JSON.stringify(msg.content, null, 2);
                } catch {
                    return String(msg.content);
                }
            }
            
            // 备选字段
            if (msg.text) {
                return msg.text;
            }
            
            if (msg.message) {
                return msg.message;
            }
            
            if (msg.result) {
                return msg.result;
            }
            
            // 最终备选
            try {
                return JSON.stringify(msg, null, 2);
            } catch {
                return String(msg);
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            const sendButton = document.getElementById('sendButton');
            
            if (!message || !currentSession) {
                alert('请先选择会话并输入消息');
                return;
            }
            
            const originalText = sendButton.textContent;
            
            try {
                // 禁用发送按钮
                sendButton.disabled = true;
                sendButton.textContent = '发送中...';
                
                // 显示用户消息（临时）
                const chatMessages = document.getElementById('chatMessages');
                const userMessage = {
                    role: 'user',
                    content: message,
                    timestamp: new Date().toISOString()
                };
                
                // 添加到显示
                const tempMessage = document.createElement('div');
                tempMessage.className = 'message message-user';
                tempMessage.innerHTML = `
                    <div class="message-header">
                        <div class="message-role">👤 用户</div>
                        <div class="message-time">刚刚</div>
                    </div>
                    <div class="message-content">${escapeHtml(message)}</div>
                `;
                chatMessages.appendChild(tempMessage);
                
                // 滚动到底部
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                // 发送到API
                const response = await fetch(`${API_BASE}/api/sessions/${currentSession}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 清空输入框
                    input.value = '';
                    
                    // 显示发送成功提示
                    const successMsg = document.createElement('div');
                    successMsg.className = 'success';
                    successMsg.textContent = '✅ 消息发送成功，等待AI回复...';
                    chatMessages.appendChild(successMsg);
                    
                    // 滚动到底部
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    
                    // 等待2秒后刷新聊天消息（用户要求）
                    setTimeout(() => {
                        loadChatMessages(currentSession);
                        loadSessions(); // 刷新会话列表
                    }, 2000);
                } else {
                    throw new Error(data.error || '发送失败');
                }
            } catch (error) {
                console.error('发送消息失败:', error);
                alert(`❌ 发送失败: ${error.message}`);
                
                // 显示错误消息
                const errorMsg = document.createElement('div');
                errorMsg.className = 'error';
                errorMsg.textContent = `发送失败: ${error.message}`;
                document.getElementById('chatMessages').appendChild(errorMsg);
            } finally {
                // 恢复发送按钮
                sendButton.disabled = false;
                sendButton.textContent = originalText;
            }
        }
        
        // 刷新聊天
        function refreshChat() {
            if (currentSession) {
                loadChatMessages(currentSession);
            } else {
                alert('请先选择一个会话');
            }
        }
        
        // 清空输入框
        function clearInput() {
            document.getElementById('messageInput').value = '';
        }
        
        // 清空聊天显示
        function clearChat() {
            if (confirm('确定要清空当前聊天显示吗？（这不会删除服务器上的消息）')) {
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = '<div class="loading">聊天已清空</div>';
                setTimeout(() => {
                    if (currentSession) {
                        loadChatMessages(currentSession);
                    }
                }, 1000);
            }
        }
        
        // 导出聊天
        function exportChat() {
            if (!currentSession) {
                alert('请先选择一个会话');
                return;
            }
            
            const messages = document.querySelectorAll('.message');
            if (messages.length === 0) {
                alert('没有消息可以导出');
                return;
            }
            
            let exportText = `OpenClaw 聊天记录导出\n`;
            exportText += `会话: ${currentSessionLabel}\n`;
            exportText += `ID: ${currentSession}\n`;
            exportText += `导出时间: ${new Date().toLocaleString()}\n`;
            exportText += `==============================\n\n`;
            
            messages.forEach(msg => {
                const role = msg.querySelector('.message-role')?.textContent || '未知';
                const content = msg.querySelector('.message-content')?.textContent || '';
                const time = msg.querySelector('.message-time')?.textContent || '';
                
                exportText += `[${time}] ${role}:\n${content}\n\n`;
            });
            
            const blob = new Blob([exportText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `openclaw-chat-${currentSession}-${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            
            alert(`聊天记录已导出为 ${a.download}`);
        }
        
        // 测试API
        async function testAPI() {
            try {
                const response = await fetch(`${API_BASE}/api/test`);
                const data = await response.json();
                
                if (data.success) {
                    alert(`✅ API测试成功\n版本: ${data.version}\n会话数: ${data.sessionsCount}`);
                } else {
                    alert(`❌ API测试失败: ${data.error}`);
                }
            } catch (error) {
                alert(`❌ API请求失败: ${error.message}`);
            }
        }
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 自动测试连接
        setTimeout(testConnection, 1000);
    </script>
</body>
</html>
